    <text x="14" y="51" class="txt small muted">1. File: PDF, tavola, contratto, SAL.</text>
    <text x="14" y="72" class="txt small muted">2. AI: propone cantiere, WBS e collegamenti.</text>
    <text x="14" y="93" class="txt small muted">3. Versioning: nuovo documento o versione.</text>
    <text x="14" y="114" class="txt small muted">4. PM: decide se serve workflow.</text>
