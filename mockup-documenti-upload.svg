<svg xmlns="http://www.w3.org/2000/svg" width="1500" height="650" viewBox="0 0 1500 650">
  <defs>
    <style>
      .bg{fill:#eaf0f1}.panel{fill:#fff;stroke:#d5dee2}.soft{fill:#eef8f6}.ink{fill:#0d1b24}.muted{fill:#61727b}.brand{fill:#0f6661}.white{fill:#fff}.warn{fill:#fff1d9}.ok{fill:#e8f6ee}.violet{fill:#eee8fb}.blue{fill:#e9f4fb}.line{stroke:#d5dee2}.txt{font-family:Arial,Helvetica,sans-serif}.title{font-size:30px;font-weight:900}.h2{font-size:17px;font-weight:850}.small{font-size:12px}.tiny{font-size:11px}.mid{font-size:14px}.bold{font-weight:850}.shadow{filter:drop-shadow(0 8px 18px rgba(20,32,34,.08))}
    </style>
  </defs>
  <rect class="bg" width="1500" height="650"/>

  <g transform="translate(20 18)">
