      <text x="80" y="25" class="txt mid muted">Documenti visibili</text>
      <rect x="80" y="38" width="104" height="22" rx="11" class="blue"/>
      <text x="94" y="53" class="txt tiny bold" fill="#146b93">Tutti i cantieri</text>
    </g>
    <g transform="translate(362 0)">
      <rect class="panel shadow" x="0" y="0" width="350" height="72" rx="9"/>
      <text x="28" y="44" class="txt title ink">2</text>
      <text x="80" y="25" class="txt mid muted">In revisione</text>
      <rect x="80" y="38" width="112" height="22" rx="11" class="warn"/>
