      <text x="146" y="15" class="txt tiny bold brand">Audit</text>
    </g>
    <line x1="0" y1="52" x2="1450" y2="52" class="line"/>
    <g transform="translate(14 82)" class="txt tiny bold muted">
      <text x="0" y="0">TIPO</text>
      <text x="74" y="0">DOCUMENTO</text>
      <text x="420" y="0">CANTIERE / CONTESTO</text>
      <text x="710" y="0">OWNER</text>
      <text x="890" y="0">VERSIONE</text>
      <text x="1040" y="0">STATO / POLICY</text>
      <text x="1320" y="0">AZIONI</text>
    </g>
    <line x1="0" y1="98" x2="1450" y2="98" class="line"/>
    <g transform="translate(14 122)">
      <rect width="40" height="40" rx="10" class="blue"/>
      <text x="8" y="25" class="txt tiny bold" fill="#146b93">PDF</text>
      <text x="74" y="17" class="txt mid bold ink">Variante impianti</text>
      <text x="74" y="38" class="txt small muted">Blocco B · v3</text>
      <text x="420" y="17" class="txt mid bold ink">Residenza Porta Nuova</text>
      <text x="420" y="38" class="txt small muted">Blocco B</text>
      <text x="710" y="17" class="txt mid bold ink">Anna S.</text>
      <text x="710" y="38" class="txt small muted">Workflow PM</text>
      <rect x="890" y="6" width="42" height="22" rx="11" class="blue"/>
      <text x="902" y="21" class="txt tiny bold" fill="#146b93">V3</text>
      <rect x="1040" y="6" width="112" height="22" rx="11" class="warn"/>
      <text x="1052" y="21" class="txt tiny bold" fill="#7d5600">In approvazione</text>
      <rect x="1160" y="6" width="78" height="22" rx="11" class="soft"/>
